#
# Single-job release on push to main. michielvha/gitversion-tag-action computes the next version
# from conventional commits and tags it; we then build the ad-hoc-signed .app on macOS and publish
# a vX.Y.Z GitHub Release with the zip asset. The Homebrew cask is bumped by vhco-pro/homebrew-tap.

name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.gitignore'
      - 'README.md'
      - 'LICENSE'
      - 'docs/**'
  workflow_dispatch:

permissions: {}

jobs:
  release:
    # macOS 26 (Tahoe) runner — ships Xcode 26, which compiles the Icon Composer AppIcon.icon.
    runs-on: macos-26
    permissions:
      contents: write # tag + create the GitHub Release
    steps:
      - name: Checkout (full history for GitVersion)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Tag with GitVersion (reusable action)
        id: version
        uses: michielvha/gitversion-tag-action@71eb5b08849c8867ee613dc9c929af41d145d91d # main snapshot 2026-05-23
        with:
          configFilePath: gitversion.yml
          prefix: 'v'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Select the newest installed Xcode
        id: xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)/Contents/Developer"
          xcodebuild -version
          echo "version=$(xcodebuild -version | head -1 | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache SwiftPM + build products
        uses: actions/cache@v5
        with:
          path: |
            .build/DerivedData/SourcePackages
            .build/DerivedData/Build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-xc${{ steps.xcode.outputs.version }}-${{ hashFiles('project.yml') }}
          restore-keys: |
            spm-${{ runner.os }}-xc${{ steps.xcode.outputs.version }}-
            spm-${{ runner.os }}-

      - name: Stamp version
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.semVer }}" SSMConnect/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${GITHUB_RUN_NUMBER}" SSMConnect/Info.plist

      - name: Build + package the signed .app
        run: ./scripts/release.sh

      - name: Verify the app icon compiled (fail loudly, never ship a blank icon)
        run: |
          APP=".build/DerivedData/Build/Products/Release/SSMConnect.app"
          plutil -p "$APP/Contents/Info.plist" | grep -q CFBundleIconName \
            || { echo "::error::AppIcon did not compile — runner Xcode is too old for AppIcon.icon"; exit 1; }
          test -f "$APP/Contents/Resources/AppIcon.icns" \
            || { echo "::error::no AppIcon.icns in the bundle"; exit 1; }
          echo "AppIcon compiled"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.semVer }}
        run: |
          gh release create "v${VERSION}" \
            --title "SSM Connect ${VERSION}" \
            --generate-notes \
            "dist/SSMConnect-${VERSION}.zip"

      - name: Note cask sync
        run: echo "::notice::Release v${{ steps.version.outputs.semVer }} published — homebrew-tap's sync-cask will bump the cask."
