#
# Self-contained release pipeline — no GitHub App / bot / cross-repo secret, just GITHUB_TOKEN.
# On every push to main: GitVersion computes the next version from conventional-commit messages.
# If that version isn't already tagged (i.e. a feat:/fix:/etc. landed), build the ad-hoc-signed
# .app on a macOS runner and publish a `vX.Y.Z` GitHub Release with the zip asset.
# The Homebrew cask is bumped automatically by a workflow in vhco-pro/homebrew-tap that watches
# this repo's releases (it writes its own cask with its own token — no cross-repo auth needed).

name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.gitignore'
      - 'README.md'
      - 'LICENSE'
      - 'docs/**'
  workflow_dispatch:

permissions: {}

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write # create the tag + GitHub Release on this repo
    steps:
      - name: Checkout (full history for GitVersion)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install tools
        run: brew install gitversion xcodegen

      - name: Select the newest installed Xcode
        id: xcode
        # XcodeGen emits a recent project format (objectVersion 77) the runner's default Xcode
        # can be too old to read; pick the newest Xcode on the image.
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)/Contents/Developer"
          xcodebuild -version
          echo "version=$(xcodebuild -version | head -1 | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache SwiftPM + build products
        # Warms after the first real build; cuts the cold aws-sdk-swift Release compile from
        # ~20 min to a few minutes. Keyed on the deps (project.yml) + Xcode version.
        uses: actions/cache@v4
        with:
          path: |
            .build/DerivedData/SourcePackages
            .build/DerivedData/Build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-xc${{ steps.xcode.outputs.version }}-${{ hashFiles('project.yml') }}
          restore-keys: |
            spm-${{ runner.os }}-xc${{ steps.xcode.outputs.version }}-
            spm-${{ runner.os }}-

      - name: Compute version
        id: ver
        run: |
          git fetch --tags --force
          VERSION="$(gitversion /config gitversion.yml /showvariable MajorMinorPatch)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::v$VERSION already released — no version-bumping commits since. Skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Releasing v$VERSION"
          fi

      - name: Stamp version from GitVersion
        if: steps.ver.outputs.exists == 'false'
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.ver.outputs.version }}" SSMConnect/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${GITHUB_RUN_NUMBER}" SSMConnect/Info.plist

      - name: Build + package the signed .app
        if: steps.ver.outputs.exists == 'false'
        run: ./scripts/release.sh

      - name: Publish GitHub Release (creates the v tag)
        if: steps.ver.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --title "SSM Connect ${VERSION}" \
            --generate-notes \
            "dist/SSMConnect-${VERSION}.zip"

      # The Homebrew cask is bumped by vhco-pro/homebrew-tap's own `sync-cask` workflow, which
      # watches this repo's releases and updates its cask with its own GITHUB_TOKEN — so no
      # cross-repo token/app/deploy-key is needed here.
      - name: Note cask sync
        if: steps.ver.outputs.exists == 'false'
        run: echo "::notice::Release v${{ steps.ver.outputs.version }} published — homebrew-tap will sync the cask within ~30 min (or trigger its sync-cask workflow to update now)."
