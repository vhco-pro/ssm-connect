#
# Self-contained release pipeline — no GitHub App / bot required, just the built-in GITHUB_TOKEN.
# On every push to main: GitVersion computes the next version from conventional-commit messages.
# If that version isn't already tagged (i.e. a feat:/fix:/etc. landed), build the ad-hoc-signed
# .app on a macOS runner and publish a `vX.Y.Z` GitHub Release with the zip asset. If a
# fine-grained TAP_TOKEN secret (contents:write on vhco-pro/homebrew-tap) is present, the Homebrew
# cask is bumped automatically; otherwise the version + sha256 are printed for a manual bump.

name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.gitignore'
      - 'README.md'
      - 'LICENSE'
      - 'docs/**'
  workflow_dispatch:

permissions: {}

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write # create the tag + GitHub Release on this repo
    steps:
      - name: Checkout (full history for GitVersion)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install tools
        run: brew install gitversion xcodegen

      - name: Select the newest installed Xcode
        # XcodeGen emits a recent project format (objectVersion 77) the runner's default Xcode
        # can be too old to read; pick the newest Xcode on the image.
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)/Contents/Developer"
          xcodebuild -version

      - name: Compute version
        id: ver
        run: |
          git fetch --tags --force
          VERSION="$(gitversion /config gitversion.yml /showvariable MajorMinorPatch)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::v$VERSION already released — no version-bumping commits since. Skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Releasing v$VERSION"
          fi

      - name: Stamp version from GitVersion
        if: steps.ver.outputs.exists == 'false'
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.ver.outputs.version }}" SSMConnect/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${GITHUB_RUN_NUMBER}" SSMConnect/Info.plist

      - name: Build + package the signed .app
        if: steps.ver.outputs.exists == 'false'
        run: ./scripts/release.sh

      - name: Publish GitHub Release (creates the v tag)
        if: steps.ver.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --title "SSM Connect ${VERSION}" \
            --generate-notes \
            "dist/SSMConnect-${VERSION}.zip"

      - name: Bump the Homebrew cask
        if: steps.ver.outputs.exists == 'false'
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          SHA="$(cut -d' ' -f1 "dist/SSMConnect-${VERSION}.zip.sha256")"
          if [ -z "${TAP_TOKEN}" ]; then
            echo "::notice::TAP_TOKEN not set — bump the cask manually: version \"${VERSION}\", sha256 \"${SHA}\""
            exit 0
          fi
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/vhco-pro/homebrew-tap.git" tap
          cd tap
          sed -i '' -E "s/  version \".*\"/  version \"${VERSION}\"/" Casks/ssm-connect.rb
          sed -i '' -E "s/  sha256 \".*\"/  sha256 \"${SHA}\"/" Casks/ssm-connect.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "ssm-connect ${VERSION}"
          git push
