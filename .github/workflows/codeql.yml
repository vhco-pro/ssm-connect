# CodeQL code scanning. Advanced setup (not the repo's default setup) because the
# Swift sources only compile after `xcodegen generate` recreates the gitignored
# .xcodeproj — CodeQL's autobuild has nothing to build otherwise. Mirrors the
# release workflow's proven macOS build environment (newest Xcode for XcodeGen's
# objectVersion 77). Actions workflows are scanned on a cheap Linux runner.
name: CodeQL

# The Swift analysis does a clean build of aws-sdk-swift (slow), so to save runner
# time it runs on PRs to main + a weekly schedule, NOT on every push to main (code
# reaches main via PR, which is already scanned). The schedule keeps the default-
# branch baseline fresh.
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 4 * * 1' # weekly, Monday 04:27 UTC
  workflow_dispatch:

permissions: {}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.runner }}
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            runner: ubuntu-latest
          - language: swift
            runner: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare Swift build (XcodeGen + newest Xcode)
        if: matrix.language == 'swift'
        run: |
          brew install xcodegen
          # XcodeGen emits a recent project format the runner's default Xcode can be too old to read.
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)/Contents/Developer"
          xcodebuild -version
          xcodegen generate

      # Cache resolved SwiftPM dependency *sources* (aws-sdk-swift is large to clone)
      # — NOT the build products, so CodeQL still traces a full clean compile.
      - name: Cache SwiftPM sources (Swift)
        if: matrix.language == 'swift'
        uses: actions/cache@v4
        with:
          path: |
            .build/DerivedData/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: codeql-spm-${{ hashFiles('SSMConnectKit/Package.resolved') }}
          restore-keys: |
            codeql-spm-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Build Swift (clean, unsigned — CodeQL traces the compile)
        if: matrix.language == 'swift'
        run: |
          set -o pipefail
          xcodebuild clean build \
            -project SSMConnect.xcodeproj \
            -scheme SSMConnect \
            -destination 'platform=macOS' \
            -derivedDataPath .build/DerivedData \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Autobuild (Actions)
        if: matrix.language == 'actions'
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
