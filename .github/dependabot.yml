version: 2
updates:
  # Swift packages — the single source of truth is SSMConnectKit/Package.swift
  # (the app's local package; ADR-P1). Dependabot reads it + the committed
  # Package.resolved and opens version + security PRs for aws-sdk-swift et al.
  - package-ecosystem: swift
    directory: /SSMConnectKit
    schedule:
      interval: weekly
    commit-message:
      prefix: build
    groups:
      swift-deps:
        patterns:
          - "*"

  # GitHub Actions used by the release + CodeQL workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns:
          - "*"
