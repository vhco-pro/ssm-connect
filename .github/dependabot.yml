version: 2
# Swift packages are NOT tracked by Dependabot here. This app's SPM deps live in
# the XcodeGen project.yml (the generated .xcodeproj is gitignored), so there's no
# Package.swift. GitHub's dependency graph does not parse a standalone
# Package.resolved (verified), so neither alerts nor update PRs fire for Swift.
# To enable them, the deps would need a Package.swift manifest as their source of
# truth (a parallel to project.yml) — deferred to avoid two sources of truth.
updates:
  # GitHub Actions used by the release + CodeQL workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns:
          - "*"
